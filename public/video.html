<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TLDW - Loading...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: "class" };
      if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
      body {
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
      }
      .prose h2 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-top: 2rem;
        margin-bottom: 0.75rem;
      }
      .prose h3 {
        font-size: 1.25rem;
        font-weight: 600;
        margin-top: 1.5rem;
        margin-bottom: 0.5rem;
      }
      .prose h4 {
        font-size: 1.1rem;
        font-weight: 600;
        margin-top: 1.25rem;
        margin-bottom: 0.5rem;
      }
      .prose p {
        margin-bottom: 0.75rem;
        line-height: 1.7;
      }
      .prose ul,
      .prose ol {
        margin-bottom: 0.75rem;
        padding-left: 1.5rem;
      }
      .prose li {
        margin-bottom: 0.25rem;
        line-height: 1.6;
      }
      .prose ul {
        list-style-type: disc;
      }
      .prose ol {
        list-style-type: decimal;
      }
      .prose a {
        color: #3b82f6;
        text-decoration: underline;
      }
      .prose a:hover {
        color: #2563eb;
      }
      .dark .prose a {
        color: #60a5fa;
      }
      .dark .prose a:hover {
        color: #93bbfd;
      }
      .prose img {
        max-width: 100%;
        border-radius: 0.5rem;
        margin: 1rem 0;
      }
      .prose strong {
        font-weight: 600;
      }
      .prose blockquote {
        border-left: 3px solid #d1d5db;
        padding-left: 1rem;
        color: #6b7280;
        margin: 1rem 0;
      }
      .dark .prose blockquote {
        border-left-color: #4b5563;
        color: #9ca3af;
      }
      @keyframes pulse-dot {
        0%,
        80%,
        100% {
          transform: scale(0);
        }
        40% {
          transform: scale(1);
        }
      }
      .loading-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        display: inline-block;
        animation: pulse-dot 1.4s infinite ease-in-out both;
      }
      .loading-dot:nth-child(1) {
        animation-delay: -0.32s;
      }
      .loading-dot:nth-child(2) {
        animation-delay: -0.16s;
      }
    </style>
  </head>
  <body class="bg-white dark:bg-gray-900 min-h-screen transition-colors">
    <header class="border-b border-gray-200 dark:border-gray-700 px-6 py-3">
      <a
        href="/"
        class="text-2xl font-bold tracking-tight text-gray-900 dark:text-gray-100"
      >
        TLDW
      </a>
    </header>

    <!-- Loading state -->
    <div id="loading" class="flex flex-col items-center justify-center py-32">
      <div class="flex gap-2 mb-4">
        <div class="loading-dot bg-gray-900 dark:bg-gray-100"></div>
        <div class="loading-dot bg-gray-900 dark:bg-gray-100"></div>
        <div class="loading-dot bg-gray-900 dark:bg-gray-100"></div>
      </div>
      <div id="loading-text" class="text-gray-500 dark:text-gray-400 text-lg text-center space-y-4">
        Checking database...
      </div>
    </div>

    <!-- Error state -->
    <div
      id="error"
      class="hidden flex flex-col items-center justify-center py-32"
    >
      <p class="text-red-500 text-xl mb-2">Something went wrong</p>
      <p id="error-detail" class="text-gray-500 dark:text-gray-400"></p>
      <a href="/" class="mt-4 text-blue-500 hover:underline">Back to home</a>
    </div>

    <!-- Content -->
    <div id="content" class="hidden max-w-3xl mx-auto px-6 py-8">
      <div class="mb-8 flex items-start gap-4">
        <img
          id="channel-avatar"
          class="flex-shrink-0 w-12 h-12 rounded-full object-cover mt-1 hidden"
          alt=""
        />
        <div>
          <h2
            id="channel-name"
            class="text-2xl font-bold text-gray-900 dark:text-gray-100"
          ></h2>
          <p
            id="channel-description"
            class="text-gray-600 dark:text-gray-400 mt-1"
          ></p>
        </div>
      </div>
      <hr class="my-6 border-gray-200 dark:border-gray-700" />
      <div class="mb-8">
        <h2
          id="video-title"
          class="text-2xl font-bold text-gray-900 dark:text-gray-100 mb-4"
        ></h2>
        <a id="thumbnail-link" href="#" target="_blank">
          <img id="thumbnail" class="w-full rounded-lg shadow-sm mb-4" alt="" />
        </a>
      </div>
      <!-- Audio -->
      <div id="audio-section" class="hidden">
        <hr class="my-6 border-gray-200 dark:border-gray-700" />
        <div class="mb-8">
          <h3 class="text-xl font-semibold text-gray-900 dark:text-gray-100 mb-3">
            Audio
          </h3>
          <audio id="audio-player" controls class="w-full"></audio>
        </div>
      </div>
      <hr class="my-6 border-gray-200 dark:border-gray-700" />
      <div class="mb-8">
        <h3 class="text-xl font-semibold text-gray-900 dark:text-gray-100 mb-3">
          Abstract
        </h3>
        <p
          id="abstract"
          class="text-gray-700 dark:text-gray-300 leading-relaxed"
        ></p>
      </div>
      <hr class="my-6 border-gray-200 dark:border-gray-700" />
      <div class="mb-8">
        <h3 class="text-xl font-semibold text-gray-900 dark:text-gray-100 mb-3">
          Summary
        </h3>
        <div id="summary" class="prose text-gray-700 dark:text-gray-300"></div>
      </div>
      <div
        class="flex gap-3 py-6 border-t border-gray-200 dark:border-gray-700"
      >
        <a
          id="download-md"
          href="#"
          class="px-4 py-2 bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition"
        >
          Download Markdown 📝
        </a>
        <a
          id="download-audio"
          href="#"
          download
          class="hidden px-4 py-2 bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition"
        >
          Download Audio 🎧
        </a>
        <a
          id="youtube-link"
          href="#"
          target="_blank"
          class="px-4 py-2 bg-blue-50 dark:bg-blue-900/30 border border-blue-200 dark:border-blue-800 rounded text-sm text-blue-700 dark:text-blue-400 hover:bg-blue-100 dark:hover:bg-blue-900/50 transition"
        >
          Watch Original ▶️
        </a>
      </div>
    </div>

    <script>
      const videoId = window.location.pathname.replace("/", "");

      if (!/^[a-zA-Z0-9_-]{11}$/.test(videoId)) {
        showError("Invalid video ID");
      } else {
        loadVideo(videoId);
      }

      async function loadVideo(id) {
        try {
          setLoading("Checking database...");
          const checkRes = await fetch(`/api/video/${id}`);
          const checkData = await checkRes.json();
          if (checkData.found) {
            renderVideo(checkData.video);
            return;
          }

          setLoading(
            "<p>Fetching captions and generating AI summary...</p><p>This usually takes about 30-45 seconds.</p><p>The page will update automatically — please do not refresh.</p>",
          );
          const processRes = await fetch(`/api/process/${id}`, {
            method: "POST",
          });

          if (!processRes.ok) {
            const err = await processRes.json();
            throw new Error(err.error || "Processing failed");
          }

          const processData = await processRes.json();
          renderVideo(processData.video);
        } catch (err) {
          showError(err.message);
        }
      }

      function setLoading(text) {
        document.getElementById("loading-text").innerHTML = text;
      }

      function showError(message) {
        document.getElementById("loading").classList.add("hidden");
        document.getElementById("error").classList.remove("hidden");
        document.getElementById("error-detail").textContent = message;
      }

      function renderVideo(video) {
        document.getElementById("loading").classList.add("hidden");
        document.getElementById("content").classList.remove("hidden");
        document.title = `TLDW - ${video.video_title}`;
        document.getElementById("channel-name").textContent =
          video.channel_name;
        document.getElementById("channel-description").textContent =
          video.channel_description || "";
        if (video.channel_avatar_url) {
          const avatar = document.getElementById("channel-avatar");
          avatar.src = video.channel_avatar_url;
          avatar.alt = video.channel_name;
          avatar.classList.remove("hidden");
        }
        document.getElementById("video-title").textContent = video.video_title;
        document.getElementById("thumbnail").src = video.thumbnail_url;
        document.getElementById("thumbnail").alt = video.video_title;
        document.getElementById("thumbnail-link").href =
          `https://www.youtube.com/watch?v=${video.video_id}`;
        document.getElementById("abstract").textContent = video.abstract;
        document.getElementById("summary").innerHTML = marked.parse(
          video.summary || "",
        );
        document.getElementById("download-md").href =
          `/api/video/${video.video_id}/markdown`;
        document.getElementById("youtube-link").href =
          `https://www.youtube.com/watch?v=${video.video_id}`;

        // Check for audio (poll a few times in case it's still generating)
        function showAudio(videoId) {
          const audioUrl = `/api/video/${videoId}/audio`;
          document.getElementById("audio-player").src = audioUrl;
          document.getElementById("audio-section").classList.remove("hidden");
          const dlAudio = document.getElementById("download-audio");
          dlAudio.href = audioUrl;
          dlAudio.classList.remove("hidden");
        }

        (async function checkAudio() {
          const delays = [
            ...Array(5).fill(1000),
            ...Array(5).fill(2000),
            ...Array(5).fill(3000),
            ...Array(5).fill(4000),
            ...Array(5).fill(5000),
          ];
          for (const delay of delays) {
            const r = await fetch(`/api/video/${video.video_id}/audio`, { method: "HEAD" });
            if (r.ok) {
              showAudio(video.video_id);
              return;
            }
            await new Promise((r) => setTimeout(r, delay));
          }
        })();
      }
    </script>
  </body>
</html>
